<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Jardinator">
<meta name="theme-color" content="#1A1A1A">
<title>Jardinator Paysage</title>
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F7F3F0;min-height:100vh;max-width:480px;margin:0 auto;display:flex;flex-direction:column}
:root{--rouge:#C0392B;--rouge-dark:#922B21;--rouge-light:#FADBD8;--rouge-mid:#E74C3C;--noir:#1A1A1A;--noir-mid:#2C2C2C;--amber:#BA7517;--amber-light:#FAEEDA;--blue:#185FA5;--blue-light:#E6F1FB;--green:#2E7D32;--green-light:#E8F5E9}
.topbar{background:var(--noir);color:white;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--rouge);position:sticky;top:0;z-index:50}
.topbar-left{display:flex;align-items:center;gap:10px}
.logo-circle{width:42px;height:42px;border-radius:50%;border:2px solid var(--rouge);overflow:hidden;background:white;flex-shrink:0}
.logo-circle img{width:100%;height:100%;object-fit:cover}
.topbar-title{font-size:17px;font-weight:600;letter-spacing:0.05em}
.topbar-sub{font-size:11px;color:#aaa;margin-top:1px}
.role-btn{background:rgba(192,57,43,0.25);border:1px solid var(--rouge);padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;color:#ffcdd2;white-space:nowrap}
.tab-bar{display:flex;background:var(--noir-mid);border-bottom:1px solid var(--rouge);position:sticky;top:68px;z-index:40}
.tab{flex:1;padding:13px 8px;text-align:center;font-size:13px;font-weight:500;color:#888;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab.active{color:var(--rouge-mid);border-bottom-color:var(--rouge-mid)}
.content{flex:1;padding:16px;overflow-y:auto}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.badge-todo{background:var(--amber-light);color:var(--amber)}
.badge-inprogress{background:var(--blue-light);color:var(--blue)}
.badge-done{background:var(--green-light);color:var(--green)}
.card{background:white;border:0.5px solid #ddd;border-left:3px solid var(--rouge);border-radius:12px;padding:14px 16px;margin-bottom:12px;cursor:pointer;transition:box-shadow .15s;-webkit-user-select:none;user-select:none}
.card:active{opacity:.85}
.card-name{font-size:16px;font-weight:600;color:var(--noir)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.card-address{font-size:13px;color:#666;margin-bottom:8px}
.card-consigne{font-size:12px;color:var(--rouge-dark);background:var(--rouge-light);padding:5px 10px;border-radius:8px;margin-top:6px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:16px;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;border:none;width:100%;margin-bottom:10px;transition:transform .1s,opacity .1s;-webkit-user-select:none;user-select:none}
.btn:active{transform:scale(.97);opacity:.9}
.btn-red{background:var(--rouge);color:white}
.btn-black{background:var(--noir);color:white}
.btn-blue{background:var(--blue);color:white}
.btn-outline-red{background:transparent;color:var(--rouge);border:1.5px solid var(--rouge)}
.btn-gray{background:#f0ebe6;color:var(--noir);border:0.5px solid #ddd}
.section-title{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;margin-top:4px}
.field-group{margin-bottom:14px}
.field-label{font-size:13px;color:#555;margin-bottom:6px;font-weight:500}
.field-input{width:100%;padding:13px 12px;border:1px solid #ddd;border-radius:10px;font-size:16px;background:white;color:var(--noir);font-family:inherit;-webkit-appearance:none}
.field-input:focus{outline:none;border-color:var(--rouge)}
select.field-input{-webkit-appearance:none}
textarea.field-input{min-height:90px;resize:vertical}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:white;border:0.5px solid #ddd;border-radius:10px;padding:12px;text-align:center}
.stat-num{font-size:26px;font-weight:700}
.stat-lbl{font-size:12px;color:#888;margin-top:2px}
.detail-row{display:flex;gap:10px;align-items:center;padding:11px 0;border-bottom:0.5px solid #eee}
.detail-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.detail-main{font-size:14px;color:var(--noir);font-weight:500}
.detail-sub{font-size:12px;color:#999}
.canvas-wrap{border:1.5px solid #ccc;border-radius:10px;background:#faf8f6;height:130px;position:relative;overflow:hidden;touch-action:none}
canvas#sigCanvas{position:absolute;top:0;left:0;width:100%;height:100%}
.sig-placeholder{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#bbb;font-size:14px;pointer-events:none;white-space:nowrap}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.photo-thumb{aspect-ratio:1;border-radius:10px;background:#f0ebe6;display:flex;align-items:center;justify-content:center;font-size:24px;border:0.5px solid #ddd;overflow:hidden}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.alert-success{padding:12px 14px;border-radius:10px;font-size:13px;margin-bottom:12px;background:var(--green-light);color:var(--green)}
.alert-info{padding:12px 14px;border-radius:10px;font-size:13px;margin-bottom:12px;background:var(--blue-light);color:var(--blue)}
.alert-warning{padding:12px 14px;border-radius:10px;font-size:13px;margin-bottom:12px;background:var(--amber-light);color:var(--amber)}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--rouge);font-size:15px;cursor:pointer;margin-bottom:16px;font-weight:500;padding:8px 0}
.gps-btn{background:var(--blue-light);color:var(--blue);border:none;border-radius:10px;padding:12px 14px;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;width:100%;margin-bottom:10px}
.divider{height:0.5px;background:#e0dbd6;margin:16px 0}
.empty-state{text-align:center;padding:50px 20px;color:#999}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.chip{padding:7px 16px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid #ddd;background:white;color:#666;transition:all .15s}
.chip.active{background:var(--rouge);color:white;border-color:var(--rouge)}
.id-badge{font-size:12px;color:var(--rouge);background:var(--rouge-light);padding:2px 10px;border-radius:12px;display:inline-block;margin-bottom:6px;font-weight:500}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:flex-end;justify-content:center;z-index:200}
.modal{background:white;border-radius:20px 20px 0 0;padding:20px 16px 40px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 20px}
.success-check{width:70px;height:70px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 16px}
#fileInputCamera, #fileInputGallery{display:none}
.sync-indicator{width:8px;height:8px;border-radius:50%;background:#4CAF50;display:inline-block;margin-right:6px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.google-sheets-url-notice{background:#e8f4fd;border:1px solid #b3d9f7;border-radius:10px;padding:12px;margin-bottom:14px;font-size:13px;color:#1565c0}
</style>
<script src="https://accounts.google.com/gsi/client" async defer></script>

<script>
// ============================================================
// CONFIGURATION — REMPLACEZ PAR VOTRE URL GOOGLE APPS SCRIPT
// ============================================================
const SHEETS_WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbxyLMTobrCcGSKJ_-YBaQhFl-5yD2r3AqxWyFFo74VYwxQ6fl-BjCsAVVA8aMtPifS9/exec';
const GDRIVE_CLIENT_ID = '106760513182-7m8qtbgnhh0t6t7g4as0rbfpund9r89a.apps.googleusercontent.com';
const GDRIVE_FOLDER_NAME = 'Jardinator Photos';
let gdriveToken = null;

async function getGDriveToken() {
  if (gdriveToken) return gdriveToken;
  return new Promise((resolve) => {
    const client = google.accounts.oauth2.initTokenClient({
      client_id: GDRIVE_CLIENT_ID,
      scope: 'https://www.googleapis.com/auth/drive.file',
      callback: (resp) => {
        if (resp.access_token) { gdriveToken = resp.access_token; resolve(gdriveToken); }
        else resolve(null);
      }
    });
    client.requestAccessToken();
  });
}

async function getOrCreateFolder(token) {
  const search = await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${GDRIVE_FOLDER_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false`, {
    headers: { Authorization: `Bearer ${token}` }
  });
  const data = await search.json();
  if (data.files && data.files.length > 0) return data.files[0].id;
  const create = await fetch('https://www.googleapis.com/drive/v3/files', {
    method: 'POST',
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: GDRIVE_FOLDER_NAME, mimeType: 'application/vnd.google-apps.folder' })
  });
  const folder = await create.json();
  // Rendre le dossier accessible à tous avec le lien
  await fetch(`https://www.googleapis.com/drive/v3/files/${folder.id}/permissions`, {
    method: 'POST',
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ role: 'reader', type: 'anyone' })
  });
  return folder.id;
}

async function uploadPhotoToDrive(base64Data, filename, token, folderId) {
  const blob = await fetch(base64Data).then(r => r.blob());
  const metadata = { name: filename, parents: [folderId] };
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
  form.append('file', blob);
  const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webContentLink,webViewLink', {
    method: 'POST',
    headers: { Authorization: `Bearer ${token}` },
    body: form
  });
  const file = await res.json();
  // Rendre la photo publique
  await fetch(`https://www.googleapis.com/drive/v3/files/${file.id}/permissions`, {
    method: 'POST',
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ role: 'reader', type: 'anyone' })
  });
  return `https://drive.google.com/uc?id=${file.id}`;
}

async function uploadAllPhotos(chantierId, photosBase64) {
  try {
    const token = await getGDriveToken();
    if (!token) return photosBase64;
    const folderId = await getOrCreateFolder(token);
    const urls = [];
    for (let i = 0; i < photosBase64.length; i++) {
      if (photosBase64[i].startsWith('http')) { urls.push(photosBase64[i]); continue; }
      const url = await uploadPhotoToDrive(photosBase64[i], `${chantierId}_photo_${i+1}.jpg`, token, folderId);
      urls.push(url);
    }
    return urls;
  } catch(e) {
    console.error('Drive upload error:', e);
    return photosBase64;
  }

let role = localStorage.getItem('jardinator_role') || 'bureau';
let activeTab = 'chantiers', filterStatut = 'tous';
let currentChantier = null, photos = [], sigData = null;
let sigDrawing = false, sigCtx = null, sigLast = null;

let chantiers = [];
let syncing = false;

function saveChantiers() {
  localStorage.setItem('jardinator_chantiers', JSON.stringify(chantiers));
}

async function loadFromSheets(silent = false) {
  if (!SHEETS_WEBHOOK_URL || SHEETS_WEBHOOK_URL === 'VOTRE_URL_APPS_SCRIPT_ICI') {
    const saved = localStorage.getItem('jardinator_chantiers');
    chantiers = saved ? JSON.parse(saved) : [];
    render(); return;
  }
  if (!silent) { syncing = true; showLoader(); }
  try {
    const res = await fetch(SHEETS_WEBHOOK_URL + '?t=' + Date.now());
    const data = await res.json();
    if (data.success && data.chantiers) {
      chantiers = data.chantiers;
      saveChantiers();
      if (!currentChantier) render();
      updateRefreshIndicator(true);
    }
  } catch(e) {
    const saved = localStorage.getItem('jardinator_chantiers');
    chantiers = saved ? JSON.parse(saved) : [];
    if (!silent) render();
    updateRefreshIndicator(false);
  }
  syncing = false;
  if (!silent) render();
}

function updateRefreshIndicator(ok) {
  const btn = document.getElementById('refresh-btn');
  if (!btn) return;
  btn.textContent = ok ? '🔄' : '⚠️';
  setTimeout(() => { if(btn) btn.textContent = '🔄'; }, 2000);
}

// Rafraîchissement automatique toutes les 30 secondes
setInterval(() => { if (!currentChantier) loadFromSheets(true); }, 30000);

function showLoader() {
  document.getElementById('content').innerHTML = `
    <div style="text-align:center;padding:60px 20px;color:#999">
      <div style="font-size:40px;margin-bottom:16px">🌹</div>
      <div style="font-size:15px;font-weight:500;color:var(--noir);margin-bottom:8px">Chargement des chantiers…</div>
      <div style="font-size:13px">Synchronisation avec Google Sheets</div>
    </div>`;
}

document.getElementById('role-label').textContent = role === 'bureau' ? 'Vue Bureau' : 'Vue Terrain';

function toggleRole() {
  role = role === 'bureau' ? 'terrain' : 'bureau';
  localStorage.setItem('jardinator_role', role);
  document.getElementById('role-label').textContent = role === 'bureau' ? 'Vue Bureau' : 'Vue Terrain';
  document.getElementById('topbar-sub').textContent = role === 'bureau' ? 'Gestion des interventions' : 'Mes chantiers du jour';
  const tabs = document.getElementById('tab-bar');
  if (role === 'terrain') {
    tabs.innerHTML = '<div class="tab active" id="tab-chantiers" onclick="switchTab(\'chantiers\')">Mes chantiers</div>';
    filterStatut = 'À faire';
  } else {
    tabs.innerHTML = '<div class="tab active" id="tab-chantiers" onclick="switchTab(\'chantiers\')">Chantiers</div><div class="tab" id="tab-nouveau" onclick="switchTab(\'nouveau\')">+ Nouveau</div><div class="tab" id="tab-stats" onclick="switchTab(\'stats\')">Dashboard</div>';
    filterStatut = 'tous';
  }
  currentChantier = null; activeTab = 'chantiers'; render();
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const el = document.getElementById('tab-' + tab);
  if (el) el.classList.add('active');
  currentChantier = null; render();
}

function render() {
  const c = document.getElementById('content');
  if (currentChantier) { renderDetail(c); return; }
  if (activeTab === 'chantiers') renderList(c);
  else if (activeTab === 'nouveau') renderNouveau(c);
  else if (activeTab === 'stats') renderStats(c);
}

function badgeHtml(s) {
  const cls = s==='À faire'?'badge-todo':s==='En cours'?'badge-inprogress':'badge-done';
  const dot = s==='À faire'?'#BA7517':s==='En cours'?'#185FA5':'#2E7D32';
  return `<span class="badge ${cls}"><span style="width:6px;height:6px;border-radius:50%;background:${dot};display:inline-block"></span>${s}</span>`;
}

function renderList(c) {
  let list = role==='terrain' ? chantiers.filter(ch=>ch.statut==='À faire') :
    (filterStatut==='tous' ? chantiers : chantiers.filter(ch=>ch.statut===filterStatut));
  let chips = role==='bureau' ? `<div class="chips">${['tous','À faire','En cours','Terminé'].map(s=>`<div class="chip ${filterStatut===s?'active':''}" onclick="setFilter('${s}')">${s==='tous'?'Tous':s}</div>`).join('')}</div>` : '';
  let cards = list.map(ch=>`
    <div class="card" onclick="openChantier('${ch.id}')">
      <div class="card-header"><div class="card-name">${ch.client}</div>${badgeHtml(ch.statut)}</div>
      <div class="card-address">📍 ${ch.adresse}</div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:12px;color:#999">${ch.id} · ${ch.date}</span>
        ${ch.consignes?'<div class="card-consigne">⚠ Consignes</div>':''}
      </div>
    </div>`).join('');

  const title = role==='terrain' ? "Chantiers à faire aujourd'hui" : 'Tous les chantiers';
  c.innerHTML = `<div class="section-title">${title} (${list.length})</div>${chips}${cards}`;
}

function setFilter(f) { filterStatut = f; render(); }

function openChantier(id) {
  // Recharger depuis localStorage pour avoir les dernières photos
  const saved = localStorage.getItem('jardinator_chantiers');
  if (saved) chantiers = JSON.parse(saved);
  currentChantier = chantiers.find(c=>c.id===id);
  photos = [...(currentChantier.photos||[])];
  sigData = currentChantier.signature;
  render(); setTimeout(initSig, 150);
}

async function supprimerChantier(id) {
  if (!confirm('Supprimer définitivement cette fiche ?')) return;
  chantiers = chantiers.filter(c => c.id !== id);
  saveChantiers();
  if (SHEETS_WEBHOOK_URL && SHEETS_WEBHOOK_URL !== 'VOTRE_URL_APPS_SCRIPT_ICI') {
    try {
      await fetch(SHEETS_WEBHOOK_URL + '?action=delete&id=' + encodeURIComponent(id));
    } catch(e) {}
  }
  currentChantier = null;
  render();
}

      ${ch.signature?`<div class="detail-row"><div class="detail-icon" style="background:var(--green-light)">✍</div><div><div class="detail-main">Signature enregistrée</div><div class="detail-sub">Client signé</div></div></div>`:''}

    ` : `
      <div class="section-title">Compte-rendu de fin de chantier</div>
      <div class="field-group">
        <div class="field-label">📝 Notes de fin d'intervention</div>
        <textarea class="field-input" id="notes-field" placeholder="Ex : RAS, client satisfait. Broyat déposé au fond du jardin.">${ch.notes||''}</textarea>
      </div>
      <div class="field-group">
        <div class="field-label">✍ Signature du client</div>
        <div class="canvas-wrap" id="canvas-wrap">
          <canvas id="sigCanvas"></canvas>
          <div class="sig-placeholder" id="sig-placeholder">Faire signer ici →</div>

      <button class="btn btn-red" onclick="terminer()" id="btn-terminer">✅ Valider et terminer le chantier</button>

    <button class="btn btn-gray" style="color:var(--rouge);border-color:var(--rouge-light)" onclick="supprimerChantier('${ch.id}')">🗑 Supprimer cette fiche</button>

function updatePhotoGrid() {
  const grid = document.getElementById('photo-grid');
  if (!grid) return;
  if (photos.length === 0) {
    grid.innerHTML = `<div style="font-size:13px;color:#999;padding:8px 0">Aucune photo ajoutée</div>`;
  } else {
    grid.innerHTML = photos.map((p,i) => `
      <div class="photo-thumb" style="position:relative">
        <img src="${p}" alt="photo ${i+1}" onerror="this.style.display='none';this.nextSibling.style.display='flex'">
        <div style="display:none;align-items:center;justify-content:center;width:100%;height:100%;font-size:11px;color:#999;text-align:center;padding:4px">Photo<br>Drive</div>
        <div onclick="removePhoto(${i})" style="position:absolute;top:4px;right:4px;background:var(--rouge);color:white;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;font-weight:700">×</div>
      </div>`).join('');
  }
  if (currentChantier) {
    currentChantier.photos = photos;
    saveChantiers();
  }
}

function initSig() {
  const wrap = document.getElementById('canvas-wrap');
  const canvas = document.getElementById('sigCanvas');
  if (!canvas || !wrap) return;
  canvas.width = wrap.offsetWidth || 400;
  canvas.height = wrap.offsetHeight || 130;
  sigCtx = canvas.getContext('2d');
  sigCtx.strokeStyle = '#1A1A1A'; sigCtx.lineWidth = 2.5; sigCtx.lineCap = 'round'; sigCtx.lineJoin = 'round';
  if (sigData && sigData !== 'signed') {
    const img = new Image();
    img.onload = () => { sigCtx.drawImage(img,0,0,canvas.width,canvas.height); };
    img.src = sigData;
    const ph = document.getElementById('sig-placeholder');
    if (ph) ph.style.display = 'none';
  }
  function getPos(e) {
    const r = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: (src.clientX - r.left) * canvas.width / r.width, y: (src.clientY - r.top) * canvas.height / r.height };
  }
  function start(e) { e.preventDefault(); sigDrawing=true; sigLast=getPos(e); const ph=document.getElementById('sig-placeholder'); if(ph) ph.style.display='none'; }
  function move(e) { e.preventDefault(); if(!sigDrawing) return; const pos=getPos(e); sigCtx.beginPath(); sigCtx.moveTo(sigLast.x,sigLast.y); sigCtx.lineTo(pos.x,pos.y); sigCtx.stroke(); sigLast=pos; }
  function end(e) { e.preventDefault(); sigDrawing=false; sigData=canvas.toDataURL(); }
  canvas.addEventListener('mousedown',start); canvas.addEventListener('mousemove',move); canvas.addEventListener('mouseup',end);
  canvas.addEventListener('touchstart',start,{passive:false}); canvas.addEventListener('touchmove',move,{passive:false}); canvas.addEventListener('touchend',end,{passive:false});
}

function clearSig() {
  if (sigCtx) { const c=document.getElementById('sigCanvas'); sigCtx.clearRect(0,0,c.width,c.height); }
  sigData = null;
  const ph = document.getElementById('sig-placeholder');
  if (ph) ph.style.display = 'block';
}

function openGPS(adresseEnc) {
  const url = `https://www.google.com/maps/search/?api=1&query=${adresseEnc}`;
  window.open(url, '_blank');
}

function removePhoto(i) {
  photos.splice(i, 1);
  updatePhotoGrid();
}

function handleFiles(files) {
  const isNouveau = window._photoTarget === 'nouveau' || (!currentChantier && activeTab === 'nouveau');
  Array.from(files).forEach(f => {
    const reader = new FileReader();
    reader.onload = ev => {
      if (isNouveau) {
        photosNouveau.push(ev.target.result);
        updatePhotoGridNouveau();
      } else {
        photos.push(ev.target.result);
        // Sauvegarder immédiatement dans le chantier et localStorage
        if (currentChantier) {
          currentChantier.photos = [...photos];
          saveChantiers();
        }
        updatePhotoGrid();
      }
    };
    reader.readAsDataURL(f);
  });
  window._photoTarget = null;
}

document.getElementById('fileInputCamera').addEventListener('change', e => {
  handleFiles(e.target.files); e.target.value = '';
});
document.getElementById('fileInputGallery').addEventListener('change', e => {
  handleFiles(e.target.files); e.target.value = '';
});

async function syncToSheets(ch) {
  if (!SHEETS_WEBHOOK_URL || SHEETS_WEBHOOK_URL === 'VOTRE_URL_APPS_SCRIPT_ICI') return false;
  try {
    const params = new URLSearchParams({
      action: 'save',
      id: ch.id, statut: ch.statut, client: ch.client, adresse: ch.adresse,
      devis: ch.devis || '', consignes: ch.consignes || '', notes: ch.notes || '',
      date: ch.date || '', dateTermine: new Date().toLocaleDateString('fr-FR'),
      nbPhotos: ch.photos ? ch.photos.length : 0,
      signature: ch.signature ? 'Oui' : 'Non'
    });
    await fetch(SHEETS_WEBHOOK_URL + '?' + params.toString());
    return true;
  } catch(e) { return false; }
}

async function terminer() {
  const notes = document.getElementById('notes-field')?.value || '';
  if (!sigData) { showModal('signature'); return; }
  const btn = document.getElementById('btn-terminer');
  if (btn) { btn.textContent = '⏳ Upload photos…'; btn.disabled = true; }
  
  // Upload photos vers Google Drive
  if (photos.length > 0) {
    const urls = await uploadAllPhotos(currentChantier.id, photos);
    photos = urls;
  }
  
  currentChantier.statut = 'Terminé';
  currentChantier.photos = photos;
  currentChantier.notes = notes;
  currentChantier.signature = sigData;
  saveChantiers();
  if (btn) btn.textContent = '⏳ Synchronisation…';
  await syncToSheets(currentChantier);
  showModal('success');
}

function showModal(type) {
  const existing = document.getElementById('modal-overlay');
  if (existing) existing.remove();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay'; overlay.id = 'modal-overlay';
  if (type === 'success') {
    overlay.innerHTML = `<div class="modal">
      <div class="modal-handle"></div>
      <div class="success-check">✅</div>
      <div style="text-align:center;font-size:20px;font-weight:700;margin-bottom:8px;color:var(--noir)">Chantier terminé !</div>
      <div style="text-align:center;font-size:14px;color:#666;margin-bottom:20px">Données enregistrées et synchronisées.</div>
      <div style="background:var(--green-light);border-radius:10px;padding:14px;margin-bottom:20px;font-size:14px;color:var(--green);line-height:1.8">
        ✓ Statut mis à jour : Terminé<br>
        ✓ ${photos.length} photo(s) enregistrée(s)<br>
        ✓ Notes sauvegardées<br>
        ✓ Signature client enregistrée<br>
        ✓ Fiche Google Sheets mise à jour
      </div>
      <button class="btn btn-black" onclick="closeModal();currentChantier=null;render()">Retour à la liste</button>
    </div>`;
  } else {
    overlay.innerHTML = `<div class="modal">
      <div class="modal-handle"></div>
      <div style="text-align:center;font-size:40px;margin-bottom:12px">✍</div>
      <div style="text-align:center;font-size:18px;font-weight:700;margin-bottom:8px;color:var(--noir)">Signature manquante</div>
      <div style="text-align:center;font-size:14px;color:#666;margin-bottom:24px">Merci de faire signer le client avant de valider le chantier.</div>
      <button class="btn btn-outline-red" onclick="closeModal()">Retour au formulaire</button>
    </div>`;
  }
  overlay.addEventListener('click', e => { if (e.target===overlay) closeModal(); });
  document.body.appendChild(overlay);
}

function closeModal() { const el=document.getElementById('modal-overlay'); if(el) el.remove(); }

let photosNouveau = [];

function updatePhotoGridNouveau() {
  const grid = document.getElementById('photo-grid-nouveau');
  if (!grid) return;
  if (photosNouveau.length === 0) {
    grid.innerHTML = `<div style="font-size:13px;color:#999;padding:8px 0">Aucune photo ajoutée</div>`;
  } else {
    grid.innerHTML = photosNouveau.map((p,i) => `

      </div>`).join('');
  }
}

async function creerChantier() {
  const client = document.getElementById('n-client').value.trim();
  const adresse = document.getElementById('n-adresse').value.trim();
  if (!client || !adresse) { alert('Merci de renseigner le nom du client et l\'adresse.'); return; }
  const id = 'CH-' + Date.now();
  let photosFinal = [...photosNouveau];
  if (photosFinal.length > 0) {
    photosFinal = await uploadAllPhotos(id, photosFinal);
  }
  const nouveau = { id, statut: document.getElementById('n-statut').value, client, adresse,
    devis: document.getElementById('n-devis').value || '—', consignes: document.getElementById('n-consignes').value,
    photos: photosFinal, notes:'', signature:null, date: document.getElementById('n-date').value };
  chantiers.unshift(nouveau);
  saveChantiers();
  await syncToSheets(nouveau);
  photosNouveau = [];
  switchTab('chantiers');
}

function renderStats(c) {
  const total = chantiers.length;
  const todo = chantiers.filter(c=>c.statut==='À faire').length;
  const inprog = chantiers.filter(c=>c.statut==='En cours').length;
  const done = chantiers.filter(c=>c.statut==='Terminé').length;
  const pct = total ? Math.round(done/total*100) : 0;
  const sheetConfigured = SHEETS_WEBHOOK_URL !== 'VOTRE_URL_APPS_SCRIPT_ICI';
  c.innerHTML = `
    <div style="font-size:20px;font-weight:700;color:var(--noir);margin-bottom:16px">Tableau de bord</div>
    <div class="stat-row">
      <div class="stat-card"><div class="stat-num" style="color:var(--amber)">${todo}</div><div class="stat-lbl">À faire</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--blue)">${inprog}</div><div class="stat-lbl">En cours</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--green)">${done}</div><div class="stat-lbl">Terminés</div></div>
    </div>
    <div class="stat-card" style="margin-bottom:14px;display:flex;align-items:center;gap:14px">
      <div style="font-size:32px">📊</div>
      <div><div style="font-weight:700;font-size:16px;color:var(--noir)">${total} chantiers au total</div><div style="font-size:13px;color:#888;margin-top:3px">${pct}% de taux de complétion</div></div>
    </div>
    <div class="divider"></div>
    <div class="section-title">Synchronisation Google Sheets</div>
    ${sheetConfigured
      ? `<div class="alert-success"><span class="sync-indicator"></span>Connecté à Google Sheets — synchronisation active</div>`
      : `<div class="alert-warning">⚠ URL Google Apps Script non configurée. Suivez le guide d'installation pour activer la synchronisation.</div>`}
    <div class="divider"></div>
    <div class="section-title">Données locales</div>
    <div style="font-size:13px;color:#666;margin-bottom:12px">Les données sont sauvegardées sur cet appareil. Configurez Google Sheets pour la synchronisation entre appareils.</div>
    <button class="btn btn-outline-red" onclick="if(confirm('Supprimer toutes les données locales ?')){localStorage.clear();location.reload()}">🗑 Réinitialiser les données locales</button>`;
}

function checkPassword() {
  const pwd = document.getElementById('pwd-input').value;
  if (pwd === 'Jardibinks2026') {
    localStorage.setItem('jardinator_auth', '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadFromSheets();
  } else {
    document.getElementById('pwd-error').style.display = 'block';
    document.getElementById('pwd-input').value = '';
  }
}

// Auto-login si déjà authentifié
if (localStorage.getItem('jardinator_auth') === '1') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadFromSheets();
}
